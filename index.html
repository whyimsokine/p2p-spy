<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Spy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root{--bg:#030308;--card:#0b0b16;--accent:#00e6b8;--red:#ff3366;--gold:#f0c050;--text:#ededf5;--muted:#6b6b85;--border:#1c1c30}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:20px 16px;min-height:100vh}
        .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
        .brand{display:flex;align-items:center;gap:10px}
        .brand-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#00c4ff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000}
        .brand-name{font-size:18px;font-weight:700}
        .brand-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
        .status{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:10px;font-weight:600;color:var(--muted)}
        .dot{width:6px;height:6px;border-radius:50%}
        .dot.green{background:var(--accent)}
        .dot.red{background:var(--red)}
        .hero{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px 20px;text-align:center;margin-bottom:14px}
        .hero-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
        .hero-value{font-size:64px;font-weight:850;letter-spacing:-3px}
        .hero-value.up{color:var(--accent)}
        .hero-value.down{color:var(--red)}
        .hero-sub{font-size:11px;color:var(--muted);margin-top:8px}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
        .tile{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px}
        .tile-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px}
        .tile-value{font-size:16px;font-weight:700}
        .tile-value.green{color:var(--accent)}
        .tile-value.red{color:var(--red)}
        .tile-value.gold{color:var(--gold)}
        .footnote{text-align:center;margin-top:16px;font-size:11px;color:var(--muted)}
        .debug{background:#fff;color:#000;font-size:12px;padding:10px;border-radius:8px;margin-top:8px;word-break:break-all;font-weight:bold}
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            <div class="brand-mark">CS</div>
            <div><div class="brand-name">Crypto Spy</div><div class="brand-sub">Arbitrage Engine</div></div>
        </div>
        <div class="status"><div class="dot" id="dot"></div><span id="statusText">-</span></div>
    </div>
    <div class="hero">
        <div class="hero-label">Spread</div>
        <div class="hero-value" id="spread">-</div>
        <div class="hero-sub">USDT → RUB</div>
    </div>
    <div class="grid">
        <div class="tile"><div class="tile-label">Buy</div><div class="tile-value green" id="buy">-</div></div>
        <div class="tile"><div class="tile-label">Sell</div><div class="tile-value red" id="sell">-</div></div>
        <div class="tile"><div class="tile-label">Profit</div><div class="tile-value gold" id="profit">-</div></div>
        <div class="tile"><div class="tile-label">Volume</div><div class="tile-value">1000 USDT</div></div>
    </div>
    <p class="footnote">/start in bot to refresh</p>
    <div class="debug" id="debug"></div>

    <script>
        const $ = s => document.querySelector(s);
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();

        const raw = new URLSearchParams(window.location.search).get('startapp');
        $('#debug').textContent = 'RAW: ' + (raw || 'NULL');

        if (!raw) { $('#statusText').textContent = 'no data'; return; }

        const parts = decodeURIComponent(raw).split('|');
        if (parts.length < 4) { $('#statusText').textContent = 'bad format'; return; }

        const spread = parseFloat(parts[0]);
        const isPos = spread > 0;
        const isHot = spread > 0.5;

        const sv = $('#spread');
        sv.textContent = (isPos ? '+' : '') + spread.toFixed(2) + '%';
        sv.className = 'hero-value ' + (isPos ? 'up' : 'down');

        $('#buy').textContent = parseFloat(parts[1]).toFixed(2) + ' ₽';
        $('#sell').textContent = parseFloat(parts[2]).toFixed(2) + ' ₽';

        const profit = parseFloat(parts[3]);
        const pv = $('#profit');
        pv.textContent = (profit >= 0 ? '+' : '') + profit.toFixed(0) + ' ₽';
        pv.className = 'tile-value ' + (profit >= 0 ? 'green' : 'red');

        const dot = $('#dot');
        const st = $('#statusText');
        if (isHot) { dot.className = 'dot red'; st.textContent = 'hot'; }
        else if (isPos) { dot.className = 'dot green'; st.textContent = 'live'; }
        else { dot.className = 'dot'; st.textContent = 'idle'; }
    </script>
</body>
</html>
