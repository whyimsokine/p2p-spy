<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Spy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #030308;
            --card: #0b0b16;
            --card2: #111122;
            --accent: #00e6b8;
            --accent2: #00c4ff;
            --red: #ff3366;
            --gold: #f0c050;
            --text: #ededf5;
            --muted: #6b6b85;
            --border: #1c1c30;
            --radius: 22px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'SF Pro Display', -apple-system, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px 16px 28px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 30% 0%, rgba(0,230,184,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 10%, rgba(0,196,255,0.03) 0%, transparent 50%);
        }

        /* ======== HEADER ======== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-mark {
            width: 42px; height: 42px;
            border-radius: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800;
            color: #000;
            box-shadow: 0 8px 24px rgba(0,230,184,0.25);
            position: relative;
        }
        .brand-mark::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            opacity: 0.3;
            filter: blur(8px);
            z-index: -1;
        }
        .brand-name {
            font-size: 19px; font-weight: 700;
            letter-spacing: -0.4px;
            line-height: 1.2;
        }
        .brand-sub {
            font-size: 10px; color: var(--muted);
            letter-spacing: 0.6px; text-transform: uppercase;
        }

        /* status indicator */
        .live-badge {
            display: flex; align-items: center; gap: 7px;
            padding: 7px 14px;
            border-radius: 20px;
            background: var(--card);
            border: 1px solid var(--border);
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--muted);
        }
        .live-ring {
            width: 7px; height: 7px;
            border-radius: 50%;
            position: relative;
        }
        .live-ring::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1.5px solid currentColor;
            animation: livePulse 2s infinite;
            opacity: 0.5;
        }
        @keyframes livePulse {
            0%,100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.8); opacity: 0; }
        }
        .live-ring.active { background: var(--accent); color: var(--accent); }
        .live-ring.hot { background: var(--red); color: var(--red); animation: hotBlink 0.6s infinite; }
        .live-ring.idle { background: var(--muted); color: var(--muted); }
        @keyframes hotBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ======== HERO ======== */
        .hero {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 30px 20px 24px;
            text-align: center;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.5;
        }
        .hero-overline {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 3px; color: var(--muted);
            margin-bottom: 10px;
        }
        .hero-number {
            font-size: 68px; font-weight: 850;
            letter-spacing: -3px; line-height: 1;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .hero-number.positive {
            color: var(--accent);
            text-shadow: 0 0 60px rgba(0,230,184,0.35);
        }
        .hero-number.negative {
            color: var(--red);
            text-shadow: 0 0 60px rgba(255,51,102,0.35);
        }
        .hero-pair {
            font-size: 12px; color: var(--muted);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* ======== METRICS ======== */
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .metric-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.15s;
        }
        .metric-card:active {
            background: var(--card2);
            transform: scale(0.96);
        }
        .metric-top {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .metric-icon {
            width: 28px; height: 28px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
        }
        .metric-icon.buy { background: rgba(0,230,184,0.12); color: var(--accent); }
        .metric-icon.sell { background: rgba(255,51,102,0.12); color: var(--red); }
        .metric-icon.profit { background: rgba(240,192,80,0.12); color: var(--gold); }
        .metric-icon.volume { background: rgba(0,196,255,0.12); color: var(--accent2); }

        .metric-label {
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--muted);
        }
        .metric-value {
            font-size: 18px; font-weight: 700;
            letter-spacing: -0.3px;
        }
        .metric-value.up { color: var(--accent); }
        .metric-value.down { color: var(--red); }

        /* ======== PROGRESS ======== */
        .goal-block {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 14px;
        }
        .goal-header {
            display: flex; justify-content: space-between;
            font-size: 12px; margin-bottom: 10px;
        }
        .goal-header .label { color: var(--muted); letter-spacing: 0.5px; }
        .goal-header .count { font-weight: 700; }
        .goal-track {
            height: 6px; background: var(--border);
            border-radius: 6px; overflow: hidden;
        }
        .goal-fill {
            height: 100%; border-radius: 6px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px rgba(0,230,184,0.3);
            position: relative;
        }
        .goal-fill::after {
            content: '';
            position: absolute;
            right: 0; top: -2px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        /* ======== ACTIONS ======== */
        .actions {
            display: flex; flex-direction: column; gap: 8px;
        }
        .btn {
            width: 100%; padding: 16px;
            border: none; border-radius: 14px;
            font-size: 14px; font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-premium {
            background: linear-gradient(135deg, #2a1a0a, #1a0a0a);
            border: 1px solid rgba(240,192,80,0.3);
            color: var(--gold);
            position: relative;
            overflow: hidden;
        }
        .btn-premium::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(240,192,80,0.06) 0%, transparent 60%);
        }

        /* ======== FOOTER ======== */
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: var(--muted);
            margin-top: 12px;
            letter-spacing: 0.4px;
            line-height: 1.6;
        }
        .footer-note .key { color: var(--accent); font-weight: 600; }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <div class="brand-mark">CS</div>
            <div>
                <div class="brand-name">Crypto Spy</div>
                <div class="brand-sub">P2P Arbitrage Engine</div>
            </div>
        </div>
        <div class="live-badge">
            <div class="live-ring" id="liveRing"></div>
            <span id="liveText">scanning</span>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div class="hero-overline">Текущий спред</div>
        <div class="hero-number" id="heroSpread">—</div>
        <div class="hero-pair">Tether USDT &rarr; Российский рубль</div>
    </div>

    <!-- METRICS -->
    <div class="metrics">
        <div class="metric-card">
            <div class="metric-top">
                <div class="metric-icon buy">B</div>
                <div class="metric-label">Покупка</div>
            </div>
            <div class="metric-value" id="buyPrice">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-top">
                <div class="metric-icon sell">S</div>
                <div class="metric-label">Продажа</div>
            </div>
            <div class="metric-value" id="sellPrice">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-top">
                <div class="metric-icon profit">P</div>
                <div class="metric-label">Прибыль</div>
            </div>
            <div class="metric-value" id="profitVal">—</div>
        </div>
        <div class="metric-card">
            <div class="metric-top">
                <div class="metric-icon volume">V</div>
                <div class="metric-label">Объём</div>
            </div>
            <div class="metric-value">1 000 USDT</div>
        </div>
    </div>

    <!-- GOAL -->
    <div class="goal-block">
        <div class="goal-header">
            <span class="label">Дневная цель</span>
            <span class="count" id="goalCount">0 / 5 связок</span>
        </div>
        <div class="goal-track">
            <div class="goal-fill" id="goalFill" style="width: 0%;"></div>
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
        <button class="btn btn-outline" onclick="window.Telegram.WebApp.close()">
            Закрыть окно
        </button>
        <button class="btn btn-premium" onclick="window.Telegram.WebApp.close()">
            Premium &middot; 499 ₽ / месяц
        </button>
    </div>

    <p class="footer-note">
        Для обновления данных нажмите <span class="key">/start</span> в боте<br>
        и откройте Mini App заново
    </p>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            const $ = (s) => document.querySelector(s);
            const urlParams = new URLSearchParams(window.location.search);
            const raw = urlParams.get('startapp');

            if (!raw) {
                $('#liveRing').className = 'live-ring idle';
                $('#liveText').textContent = 'no data';
                return;
            }

            try {
                const d = JSON.parse(decodeURIComponent(raw));
                const spread = d.spread_pct;
                const isPos = spread > 0;
                const isHot = spread > 0.5;

                // Hero
                const hero = $('#heroSpread');
                hero.textContent = (isPos ? '+' : '') + spread.toFixed(2) + '%';
                hero.className = 'hero-number ' + (isPos ? 'positive' : 'negative');

                // Prices
                $('#buyPrice').textContent = d.buy_rate + ' ₽';
                $('#sellPrice').textContent = d.sell_rate + ' ₽';

                const profit = d.profit_1000;
                const pv = $('#profitVal');
                pv.textContent = (profit >= 0 ? '+' : '') + profit.toFixed(0) + ' ₽';
                pv.className = 'metric-value ' + (profit >= 0 ? 'up' : 'down');

                // Live badge
                const ring = $('#liveRing');
                const liveText = $('#liveText');
                if (isHot) {
                    ring.className = 'live-ring hot';
                    liveText.textContent = 'hot signal';
                } else if (isPos) {
                    ring.className = 'live-ring active';
                    liveText.textContent = 'profitable';
                } else {
                    ring.className = 'live-ring idle';
                    liveText.textContent = 'waiting';
                }

                // Goal
                const goal = Math.min(Math.floor(Math.abs(spread) * 3), 5);
                $('#goalCount').textContent = goal + ' / 5 связок';
                $('#goalFill').style.width = (goal / 5 * 100) + '%';

            } catch(e) {
                $('#heroSpread').textContent = '—';
                $('#liveText').textContent = 'error';
            }

            console.log('%cCS%c Crypto Spy Engine',
                'color:#000;background:#00e6b8;padding:2px 6px;border-radius:4px;font-weight:700;',
                'color:#888;');
        })();
    </script>
</body>
</html>
