<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crypto Spy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #02020a;
            --card: #0d0d1a;
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.2);
            --red: #ff3b5c;
            --red-glow: rgba(255, 59, 92, 0.2);
            --text: #f4f4ff;
            --muted: #7a7a9e;
            --border: #1a1a30;
            --radius: 20px;
            --radius-sm: 14px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'SF Pro Display', -apple-system, 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 12px 16px 32px;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            background-image:
                radial-gradient(ellipse at 50% 0%, rgba(0,255,204,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,59,92,0.02) 0%, transparent 50%);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logo-wrap { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 44px; height: 44px; border-radius: 15px;
            background: rgba(0,255,204,0.08);
            border: 1px solid rgba(0,255,204,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
            animation: logoGlow 3s ease-in-out infinite;
        }
        @keyframes logoGlow {
            0%,100% { box-shadow: 0 0 0 0 var(--accent-glow); }
            50% { box-shadow: 0 0 20px 4px var(--accent-glow); }
        }
        .logo-text h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .logo-text span { font-size: 11px; color: var(--muted); }

        .status-pill {
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: 700;
            border: 1.5px solid var(--border);
            background: var(--card);
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--muted);
        }
        .status-dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: pulse 2s infinite; }
        .status-dot.hot { background: var(--red); box-shadow: 0 0 12px var(--red-glow); animation: pulse 0.8s infinite; }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        .hero-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 20px 22px;
            margin-bottom: 14px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero-label {
            font-size: 11px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--muted); margin-bottom: 8px;
        }
        .hero-value {
            font-size: 64px; font-weight: 850;
            letter-spacing: -3px; line-height: 1;
            transition: color 0.3s;
        }
        .hero-value.green { color: var(--accent); text-shadow: 0 0 40px var(--accent-glow); }
        .hero-value.red { color: var(--red); text-shadow: 0 0 40px var(--red-glow); }
        .hero-pair { font-size: 13px; color: var(--muted); margin-top: 6px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .info-tile {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 16px;
            transition: 0.15s; cursor: pointer;
        }
        .info-tile:active { background: #12122a; transform: scale(0.96); }
        .info-tile .tile-icon { font-size: 20px; margin-bottom: 6px; }
        .info-tile .tile-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
        .info-tile .tile-value { font-size: 17px; font-weight: 700; }
        .tile-value.up { color: var(--accent); }
        .tile-value.down { color: var(--red); }

        .section-block {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 18px 16px; margin-bottom: 14px;
        }
        .section-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; }
        .section-row .muted { color: var(--muted); }
        .progress-track { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
        .progress-fill {
            height: 100%; border-radius: 8px;
            background: linear-gradient(90deg, var(--accent), #00ccaa);
            transition: width 0.6s;
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .btn {
            width: 100%; padding: 17px; border: none;
            border-radius: var(--radius-sm); font-size: 15px;
            font-weight: 700; cursor: pointer; margin-bottom: 10px;
            transition: 0.15s;
        }
        .btn:active { transform: scale(0.96); }
        .btn-glass { background: var(--card); border: 1.5px solid var(--border); color: var(--text); }
        .btn-premium { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; }

        .hint {
            text-align: center; font-size: 11px; color: var(--muted);
            margin-top: 4px; line-height: 1.6;
        }
        .hint span { color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-wrap">
            <div class="logo-icon">🔮</div>
            <div class="logo-text">
                <h2>Crypto Spy</h2>
                <span>P2P Arbitrage</span>
            </div>
        </div>
        <div class="status-pill">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusLabel">Загрузка</span>
        </div>
    </div>

    <div class="hero-card">
        <div class="hero-label">Текущий спред</div>
        <div class="hero-value" id="spreadValue">—</div>
        <div class="hero-pair">USDT → RUB</div>
    </div>

    <div class="grid-2">
        <div class="info-tile">
            <div class="tile-icon">📥</div>
            <div class="tile-label">Покупка</div>
            <div class="tile-value" id="buyValue">—</div>
        </div>
        <div class="info-tile">
            <div class="tile-icon">📤</div>
            <div class="tile-label">Продажа</div>
            <div class="tile-value" id="sellValue">—</div>
        </div>
        <div class="info-tile">
            <div class="tile-icon">💰</div>
            <div class="tile-label">Прибыль</div>
            <div class="tile-value" id="profitValue">—</div>
        </div>
        <div class="info-tile">
            <div class="tile-icon">📊</div>
            <div class="tile-label">Объём</div>
            <div class="tile-value">1000 USDT</div>
        </div>
    </div>

    <div class="section-block">
        <div class="section-row">
            <span class="muted">🎯 Дневная цель</span>
            <span id="goalText">0 / 5 связок</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
    </div>

    <button class="btn btn-glass" onclick="window.Telegram.WebApp.close()">
        ✕ Закрыть
    </button>
    <button class="btn btn-premium" onclick="window.Telegram.WebApp.close()">
        💎 Premium · 499 ₽/мес
    </button>

    <p class="hint">
        Чтобы обновить данные —<br>
        закрой Mini App и нажми <span>/start</span> в боте
    </p>

    <script>
        (function() {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();

            const $ = (s) => document.querySelector(s);

            // Читаем данные из URL
            const urlParams = new URLSearchParams(window.location.search);
            const raw = urlParams.get('startapp');

            if (raw) {
                try {
                    const data = JSON.parse(decodeURIComponent(raw));
                    const spread = data.spread_pct;
                    const isPositive = spread > 0;
                    const isHot = spread > 0.5;

                    // Hero
                    const sv = $('#spreadValue');
                    sv.textContent = spread.toFixed(2) + '%';
                    sv.className = 'hero-value ' + (isPositive ? 'green' : 'red');

                    // Grid
                    $('#buyValue').textContent = data.buy_rate + ' ₽';
                    $('#sellValue').textContent = data.sell_rate + ' ₽';
                    const profit = data.profit_1000;
                    const pv = $('#profitValue');
                    pv.textContent = (profit >= 0 ? '+' : '') + profit.toFixed(0) + ' ₽';
                    pv.className = 'tile-value ' + (profit >= 0 ? 'up' : 'down');

                    // Status
                    const dot = $('#statusDot');
                    const label = $('#statusLabel');
                    if (isHot) {
                        dot.className = 'status-dot hot';
                        label.textContent = '🔥 Связка!';
                    } else if (isPositive) {
                        dot.className = 'status-dot live';
                        label.textContent = '🟢 Выгодно';
                    } else {
                        dot.className = 'status-dot';
                        label.textContent = '⏳ Ждём';
                    }

                    // Progress
                    const goal = Math.min(Math.floor(Math.abs(spread) * 3), 5);
                    $('#goalText').textContent = goal + ' / 5 связок';
                    $('#progressFill').style.width = (goal / 5 * 100) + '%';

                } catch(e) {
                    $('#spreadValue').textContent = 'Ошибка';
                }
            } else {
                $('#statusLabel').textContent = 'Нет данных';
                $('#spreadValue').textContent = '—';
            }

            console.log('%c🔮 Crypto Spy %cReady', 'color:#00ffcc;font-size:16px;', 'color:#888;');
        })();
    </script>
</body>
</html>
