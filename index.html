<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Spy</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .header h1 { font-size: 20px; color: #38bdf8; }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-label { font-size: 13px; color: #94a3b8; }
        .card-value { font-size: 16px; font-weight: 600; }
        .green { color: #4ade80; }
        .red { color: #f87171; }
        
        .spread-big {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            margin: 8px 0;
        }
        
        canvas { margin: 16px 0; max-height: 200px; }
        
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .btn-primary { background: #38bdf8; color: #0f172a; }
        .btn-outline { background: transparent; border: 2px solid #38bdf8; color: #38bdf8; }
        .btn-premium { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; }
        
        .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #94a3b8; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }
        .dot.red { background: #f87171; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Crypto Spy</h1>
        <p>Мониторинг P2P-связок USDT/RUB</p>
    </div>

    <!-- Текущий спред -->
    <div class="card">
        <div class="card-row">
            <span class="card-label">Текущий спред</span>
            <span class="status"><span class="dot" id="statusDot"></span> <span id="statusText">Загрузка...</span></span>
        </div>
        <div class="spread-big" id="spreadValue">—</div>
        <div class="card-row">
            <span class="card-label">📥 Покупка</span>
            <span class="card-value" id="buyRate">—</span>
        </div>
        <div class="card-row">
            <span class="card-label">📤 Продажа</span>
            <span class="card-value" id="sellRate">—</span>
        </div>
        <div class="card-row">
            <span class="card-label">💰 С 1000 USDT</span>
            <span class="card-value" id="profit">—</span>
        </div>
    </div>

    <!-- График -->
    <div class="card">
        <canvas id="chart"></canvas>
    </div>

    <!-- Действия -->
    <button class="btn btn-primary" onclick="refreshData()">🔄 Обновить</button>
    <button class="btn btn-outline" id="btnNotify" onclick="toggleNotify()">🔕 Уведомления</button>
    <button class="btn btn-premium" onclick="buyPremium()">💎 Premium — 499₽/мес</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // Данные для графика (последние 20 точек)
        let history = [];
        const MAX_HISTORY = 20;

        // График
        const ctx = document.getElementById('chart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Спред %',
                    data: [],
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: {
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8', callback: v => v.toFixed(2) + '%' }
                    }
                }
            }
        });

        function updateUI(data) {
            const spreadEl = document.getElementById('spreadValue');
            const profitEl = document.getElementById('profit');
            const dotEl = document.getElementById('statusDot');
            const statusEl = document.getElementById('statusText');

            document.getElementById('buyRate').textContent = data.buy_rate + ' RUB';
            document.getElementById('sellRate').textContent = data.sell_rate + ' RUB';

            spreadEl.textContent = data.spread_pct.toFixed(2) + '%';
            profitEl.textContent = data.profit_1000.toFixed(0) + ' RUB';

            if (data.spread_pct > 0) {
                spreadEl.className = 'spread-big green';
                profitEl.className = 'card-value green';
                dotEl.className = 'dot';
                statusEl.textContent = 'Есть связки!';
            } else {
                spreadEl.className = 'spread-big red';
                profitEl.className = 'card-value red';
                dotEl.className = 'dot red';
                statusEl.textContent = 'Рынок тихий';
            }

            // Обновляем график
            const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            history.push({ time: now, value: data.spread_pct });
            if (history.length > MAX_HISTORY) history.shift();

            chart.data.labels = history.map(h => h.time);
            chart.data.datasets[0].data = history.map(h => h.value);
            chart.update();
        }

        function refreshData() {
            // Отправляем запрос боту — он вернёт данные через sendData или через API
            tg.sendData(JSON.stringify({ action: 'get_spread' }));
            // Показываем загрузку
            document.getElementById('statusText').textContent = 'Обновление...';
        }

        function toggleNotify() {
            const btn = document.getElementById('btnNotify');
            if (btn.textContent.includes('🔕')) {
                btn.textContent = '🔔 Включить уведомления';
                tg.sendData(JSON.stringify({ action: 'notify_off' }));
            } else {
                btn.textContent = '🔕 Отключить уведомления';
                tg.sendData(JSON.stringify({ action: 'notify_on' }));
            }
        }

        function buyPremium() {
            tg.sendData(JSON.stringify({ action: 'buy_premium' }));
            tg.showPopup({
                title: 'Premium-подписка',
                message: '499 RUB/мес. Оплатить?',
                buttons: [
                    { id: 'pay', type: 'default', text: 'Оплатить' },
                    { type: 'cancel' }
                ]
            });
        }

        // Обновление каждые 10 секунд
        setInterval(refreshData, 10000);
        refreshData();
    </script>
</body>
</html>
