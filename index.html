<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Spy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #38bdf8; font-size: 22px; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin: 12px 0;
        }
        .price { font-size: 28px; font-weight: 700; margin: 10px 0; }
        .green { color: #4ade80; }
        .red { color: #f87171; }
        .label { color: #94a3b8; font-size: 13px; }
        
        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 6px 0;
            background: #38bdf8;
            color: #0f172a;
        }
        button.outline {
            background: transparent;
            border: 2px solid #38bdf8;
            color: #38bdf8;
        }
        button.premium {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
        }
    </style>
</head>
<body>
    <h1>🔍 Crypto Spy</h1>
    <p>Мониторинг P2P-связок USDT/RUB</p>

    <div class="card">
        <div class="label">Текущий спред</div>
        <div class="price" id="spread">—</div>
        <div class="label">📥 Покупка: <span id="buy">—</span></div>
        <div class="label">📤 Продажа: <span id="sell">—</span></div>
        <div class="label">💰 С 1000 USDT: <span id="profit">—</span></div>
    </div>

    <button onclick="refresh()">🔄 Обновить</button>
    <button class="outline" id="btnNotify" onclick="toggleNotify()">🔕 Уведомления</button>
    <button class="premium" onclick="buyPremium()">💎 Premium — 499₽/мес</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function refresh() {
            document.getElementById('spread').textContent = 'Загрузка...';
            tg.sendData(JSON.stringify({action: 'get_spread'}));
        }

        function toggleNotify() {
            const btn = document.getElementById('btnNotify');
            if (btn.textContent.includes('🔕')) {
                btn.textContent = '🔔 Включить уведомления';
                tg.sendData(JSON.stringify({action: 'notify_off'}));
            } else {
                btn.textContent = '🔕 Отключить уведомления';
                tg.sendData(JSON.stringify({action: 'notify_on'}));
            }
        }

        function buyPremium() {
            tg.sendData(JSON.stringify({action: 'buy_premium'}));
        }

        // Обновление при открытии
        refresh();
    </script>
</body>
</html>
